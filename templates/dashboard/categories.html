{% extends 'base.html' %}

{% block content %}
<div class="row" style="margin: 0;" >


     {% include 'dashboard/sidebar.html'%}
        
   <div class="col-md-9" style="background-color: #ffffff; padding: 30px;">
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 style="color: #333; margin: 0; border-left: 3px solid #9c9c9c; padding:2px;">
            ALL CATEGORIES
        </h3>
        <a href="{% url 'add_category' %}" class="btn" style="color:black; background-color: #d4d4d4ad;">ADD NEW</a>
    </div>

    <table class="table table-hover">
        <thead>
            <tr>
                <th>#</th>
                <th>Category Name</th>
                <th>Created At</th>
                <th>Updated At</th> 
                <th class="text-right">Action</th> </tr>
        </thead>
        <tbody>
            {% for cat in categories %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ cat }}</td>
                <td>{{ cat.created_at }}</td>
                <td>{{ cat.updated_at }}</td>
                <td class="text-right"> <a href="{% url 'edit_category' cat.id %}"><i class="fa fa-edit text-success"></i></a>&nbsp;
                    <a href="{% url 'delete_category' cat.id %}"><i class="fa fa-trash text-danger"></i></a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
</div>
</div>


{% endblock %}
