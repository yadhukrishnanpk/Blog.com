<!-- Header-->
{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="auto">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog.com</title>
    <link href="{% static 'CSS/blog.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="py-4 border-bottom">
            <div class="row flex-nowrap justify-content-between align-items-center">
                
                <div class="col-4 text-center">
                    <a class="blog-header-logo text-body-emphasis text-decoration-none"  href="/">BLOG.com</a>
                </div>
                <div class="col-4 d-flex justify-content-end align-items-center">
                    <button class="btn btn-link link-secondary p-0 me-3" aria-label="Search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" class="bi bi-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </button>
                    <a class="btn btn-warning btn-sm px-3 rounded-pill" href="#">Signup</a>
                    <a class="btn btn-warning btn-sm px-3 rounded-pill" href="#">Login</a>
                </div>
            </div>
        </header>
       
        <div class="nav-scroller py-1 mb-3">
            <nav class="nav justify-content-center">
                 {% for cat in  categories %}
                <a class="nav-item nav-link active" href="{% url 'posts_by_category' cat.id %}">{{ cat.category_name}}</a>
                {% endfor %}
                
            </nav>
        </div>
    </div>




<!-- main content-->

{% block content %}


{% endblock %}





<!-- footer-->
  <footer class=" bg-white text-center">
        <p class="text-muted">© 2026 Editorial Magazine. Built with Bootstrap.</p>
        <p class="mb-0"><a href="#" class="link-primary">Back to top</a></p>
    </footer>

    </body>
</html>
