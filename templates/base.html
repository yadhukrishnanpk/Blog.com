<!-- Header-->
{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="auto">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog.com</title>
    <link href="{% static 'CSS/blog.css' %}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="container">
        <header class="py-4 border-bottom">
            <div class="row flex-nowrap justify-content-between align-items-center">
                
                <div class="col-4 text-center">
                    <a class="blog-header-logo text-body-emphasis text-decoration-none"  href="/">BLOG.com</a>
                </div>
                <div class="col-2 d-flex justify-content-end align-items-center fw-wrap">

                    <form action="{% url 'search' %}" method="GET" style="display: flex; align-items: center;  max-width: 300px; border-bottom: 2px solid #333; padding: 5px 0; ">
                        <input type="text" name="keyword" value="{{ keyword }}" placeholder="Type to search..." 
                            style="flex-grow: 1; border: none; background: transparent; outline: none; font-size: 15px; padding-left: 5px;">
                        <button type="submit" style="background: none; border: none; cursor: pointer; font-size: 18px; padding: 0 5px;">
                           <i class="fa fa-search"></i>
                        </button>
                    </form>

                    <a class="btn btn btn-sm px-3 rounded-pill" href="#">Signup</a>
                    <a class="btn btn  btn-sm px-3 rounded-pill" href="#">Login</a>
                </div>
            </div>
            </div>
        </header>
    </div>

        <div class="nav-scroller py-1 mb-3">
            <nav class="nav justify-content-center">
                 {% for cat in  categories %}
                <a class="nav-item nav-link active" href="{% url 'posts_by_category' cat.id %}">{{ cat.category_name}}</a>
                {% endfor %}
                
            </nav>
        </div>
    </div>




<!-- main content-->

{% block content %}


{% endblock %}

<!-- footer-->
  <footer class=" bg-white text-center">
        <p class="text-muted">© 2026 Blog.com. Built with Yadhu.</p>
        <p class="mb-0" ><a href="#" class="link-primary" style="text-decoration: none;">BACK TO TOP</a></p>
    </footer>

    </body>
</html>
